<!DOCTYPE html>
<html>
<head>
  <title>Dashboard</title>
  <link rel="stylesheet" href="styles.css">
</head>
<body>

<div id="loading">
  <h1>Loading dashboard...</h1>
</div>

<div id="loginContainer" style="display:none;">
  <h1>Please log in</h1>
  <a href="/auth/eve/login">Login with EVE Online</a>
</div>

<div id="dashboardContainer" style="display:none;">
  <img id="portrait" />
  <h2 id="charName"></h2>
  <p id="corp"></p>
  <p id="alliance"></p>
  <p id="status"></p>

  <button id="applyBtn" style="display:none;">
    I have applied to corp in-game
  </button>

</div>

<script src="app.js"></script>

</body>
</html>
